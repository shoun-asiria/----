<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>函館行政書士事務所 | あなたの街の法務パートナー</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <div class="logo">函館行政書士事務所</div>
            <ul>
                <li><a href="#home">ホーム</a></li>
                <li><a href="#services">業務内容</a></li>
                <li><a href="#about">事務所概要</a></li>
                <li><a href="#contact" class="btn-nav">お問い合わせ</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="hero-content fade-in">
                <h1>函館の未来を、法務で支える。</h1>

        <section id="services" class="services">
            <h2 class="section-title">主要業務</h2>
            <div class="service-grid">
                <div class="service-card scroll-reveal">
                    <h3>相続・遺言</h3>
                    <p>大切な想いをつなぐお手伝いをいたします。</p>
                </div>
                <div class="service-card scroll-reveal">
                    <h3>建設業許可</h3>
                    <p>複雑な書類作成から申請までサポート。</p>
                </div>
                <div class="service-card scroll-reveal">
                    <h3>法人設立</h3>
                    <p>起業家の第一歩を全力でバックアップします。</p>
                </div>
            </div>

    <footer>
